<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shirin Kafe - Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
</head>
<body data-theme="dark" data-layout="grid-2">

    <!-- Splash Screen -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo"><span class="splash-icon">🍽️</span></div>
            <h1 class="splash-title">Shirin</h1>
            <p class="splash-subtitle">Kafe & Taomxona</p>
            <div class="splash-loader"><div class="loader-bar"></div></div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-bg"></div>
        <div class="header-content">
            <div class="restaurant-info">
                <div class="logo-wrapper"><span class="logo-icon">🍽️</span></div>
                <div class="info-text">
                    <h1 class="restaurant-name">Shirin</h1>
                    <p class="restaurant-tagline">Kafe & Taomxona</p>
                </div>
            </div>
            <div class="header-details">
                <div class="detail-item"><span class="detail-icon">🕐</span><span>08:00 - 22:00</span></div>
                <div class="detail-item"><span class="detail-icon">📞</span><a href="tel:+998901234567">+998 90 123 45 67</a></div>
            </div>
        </div>
    </header>

    <!-- Toolbar: Language, Theme, Layout -->
    <div class="toolbar" id="toolbar">
        <div class="toolbar-inner">
            <!-- Language -->
            <div class="toolbar-group">
                <button class="tool-btn lang-btn active" data-lang="uz">UZ</button>
                <button class="tool-btn lang-btn" data-lang="krill">УЗ</button>
                <button class="tool-btn lang-btn" data-lang="ru">RU</button>
            </div>
            <!-- Layout -->
            <div class="toolbar-group">
                <button class="tool-btn layout-btn" data-layout="grid-1" aria-label="1 ustun">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="14" height="3" rx="1"/><rect x="1" y="6" width="14" height="3" rx="1"/><rect x="1" y="11" width="14" height="3" rx="1"/></svg>
                </button>
                <button class="tool-btn layout-btn active" data-layout="grid-2" aria-label="2 ustun">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
                </button>
                <button class="tool-btn layout-btn" data-layout="grid-3" aria-label="3 ustun">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="3.5" height="6" rx="0.7"/><rect x="6.25" y="1" width="3.5" height="6" rx="0.7"/><rect x="11.5" y="1" width="3.5" height="6" rx="0.7"/><rect x="1" y="9" width="3.5" height="6" rx="0.7"/><rect x="6.25" y="9" width="3.5" height="6" rx="0.7"/><rect x="11.5" y="9" width="3.5" height="6" rx="0.7"/></svg>
                </button>
            </div>
            <!-- Font Size -->
            <div class="toolbar-group">
                <button class="tool-btn font-btn" data-font="down" aria-label="Kichik">A−</button>
                <button class="tool-btn font-btn" data-font="up" aria-label="Katta">A+</button>
            </div>
            <!-- Theme -->
            <div class="toolbar-group">
                <button class="tool-btn theme-btn" data-theme="dark" aria-label="Qora tema">
                    <span class="theme-dot dark-dot active-dot"></span>
                </button>
                <button class="tool-btn theme-btn" data-theme="light" aria-label="Oq tema">
                    <span class="theme-dot light-dot"></span>
                </button>
                <button class="tool-btn theme-btn" data-theme="gold" aria-label="Oltin tema">
                    <span class="theme-dot gold-dot"></span>
                </button>
                <button class="tool-btn theme-btn" data-theme="green" aria-label="Yashil tema">
                    <span class="theme-dot green-dot"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-container" id="searchContainer">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Taom qidirish..." autocomplete="off">
            <button class="search-clear" id="searchClear">✕</button>
        </div>
    </div>

    <!-- Category Nav -->
    <nav class="category-nav" id="categoryNav">
        <div class="category-scroll" id="categoryScroll">
            <!-- Filled by JS -->
        </div>
    </nav>

    <!-- Menu Content -->
    <main class="menu-content" id="menuContent"></main>

    <!-- Item Detail Modal -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal-content item-modal">
            <button class="modal-close" id="itemClose">✕</button>
            <div class="item-modal-img" id="itemModalImg"></div>
            <div class="item-modal-body">
                <div class="item-modal-badge" id="itemModalBadge"></div>
                <h2 class="item-modal-name" id="itemModalName"></h2>
                <div class="item-modal-details">
                    <div class="detail-chip"><span>⚖️</span> <span id="itemWeightVal"></span></div>
                    <div class="detail-chip"><span>⏱️</span> <span id="itemTimeVal"></span></div>
                </div>
                <div class="item-modal-price" id="itemModalPrice"></div>
                <a class="order-btn" id="orderBtn" href="#" target="_blank">
                    <span>📱</span> <span id="orderBtnText">Buyurtma berish</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="footer-logo">🍽️</span>
                <span class="footer-name">Shirin Kafe</span>
            </div>
            <div class="footer-social">
                <a href="#" class="social-link" aria-label="Instagram">📷</a>
                <a href="#" class="social-link" aria-label="Telegram">✈️</a>
            </div>
            <p class="footer-copy" id="footerCopy">© 2026 Shirin Kafe</p>
        </div>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="↑">↑</button>

    <script src="js/menu-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
